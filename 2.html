<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth · Internship Portal</title>
  
  <!-- Bootstrap 5 CSS (light grid usage) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Fonts: Poppins (consistent with both concepts) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #dfe6ec;
      overflow-x: hidden;
    }

    /* ========== MAIN HERO (full viewport) ========== */
    .hero {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f8faff 0%, #edf2fb 100%);
      overflow: hidden;
    }

    /* container that holds two columns: left = text, right = growth chart */
    .split-container {
      display: flex;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 40px 40px 60px;
      align-items: center;
      gap: 30px;
      position: relative;
      z-index: 20;
      flex-wrap: wrap; /* for mobile */
    }

    /* LEFT COLUMN – internship content (now on left) */
    .content-col {
      flex: 1 1 500px;
      text-align: left;
      position: relative;
      z-index: 25;
      padding: 20px 20px 20px 30px;
    }

    /* headline – font size reduced */
    .content-col h1 {
      font-size: 58px;        /* reduced from 70px */
      font-weight: 800;
      color: #0a192f;
      line-height: 1.1;
      text-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #2563eb, #7c3aed, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 5s ease infinite;
      display: inline-block;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* description – slightly smaller */
    .hero-description {
      max-width: 600px;
      color: #1e293b;
      font-size: 16px;         /* reduced from 18px */
      font-weight: 400;
      background: rgba(255, 255, 255, 0.7);
      padding: 14px 24px;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      margin: 24px 0;
    }

    .hero-btn {
      padding: 14px 44px;      /* slightly smaller */
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;         /* reduced from 20px */
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .hero-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 45px rgba(124, 58, 237, 0.4);
    }

    /* RIGHT COLUMN – growth bars (now on right) */
    .growth-col {
      flex: 1 1 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .growth-container {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 40px 20px;
      background: transparent;
      border-radius: 32px;
    }

    .bar {
      width: 70px;
      background: linear-gradient(145deg, #e8cfa3, #d9b37c);
      border-radius: 4px 4px 0 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      color: #222;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    .bar:nth-child(1) { height: 120px; }
    .bar:nth-child(2) { height: 160px; }
    .bar:nth-child(3) { height: 200px; }
    .bar:nth-child(4) { height: 240px; }
    .bar:nth-child(5) { height: 280px; }
    .bar:nth-child(6) { height: 320px; }

    .bar span {
      margin-bottom: 10px;
    }

    /* curved arrow (now on right side, but stays within growth-col) */
    .arrow {
      position: absolute;
      width: 450px;
      height: 200px;
      border-top: 3px solid #ffffff;
      border-right: 3px solid transparent;
      border-left: 3px solid transparent;
      border-radius: 100% 100% 0 0;
      top: -20px;
      left: -30px;
      transform: rotate(15deg);
      pointer-events: none;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: -8px;
      top: -12px;
      border-left: 15px solid #ffffff;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      transform: rotate(25deg);
    }

    /* ========== BACKGROUND ZIGZAG PATTERN ========== */
    .zigzag-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .zigzag-line {
      position: absolute;
      width: 100%;
      height: 3px;
    }

    .zigzag-line-1 { top: 15%; left: -5%; width: 110%; transform: rotate(2deg); background: repeating-linear-gradient(45deg, #2563eb15, #2563eb15 20px, transparent 20px, transparent 35px); }
    .zigzag-line-2 { top: 40%; right: -5%; width: 110%; transform: rotate(-3deg); background: repeating-linear-gradient(-45deg, #7c3aed20, #7c3aed20 25px, transparent 25px, transparent 40px); }
    .zigzag-line-3 { bottom: 25%; left: -5%; width: 110%; transform: rotate(4deg); background: repeating-linear-gradient(45deg, #db277720, #db277720 18px, transparent 18px, transparent 33px); }
    .zigzag-line-4 { top: 70%; right: -5%; width: 110%; transform: rotate(-5deg); background: repeating-linear-gradient(-45deg, #f59e0b20, #f59e0b20 22px, transparent 22px, transparent 37px); }
    .zigzag-line-5 { top: 85%; left: -5%; width: 110%; transform: rotate(2deg); background: repeating-linear-gradient(45deg, #2563eb15, #2563eb15 20px, transparent 20px, transparent 35px); }
    .zigzag-line-6 { top: 5%; right: -5%; width: 110%; transform: rotate(-2deg); background: repeating-linear-gradient(-45deg, #7c3aed15, #7c3aed15 25px, transparent 25px, transparent 40px); }

    /* ========== FLOATING ICONS – many more added (now 30 icons) ========== */
    .icon {
      position: absolute;
      width: 60px;            /* slightly smaller */
      opacity: 0.2;
      animation: float 8s infinite ease-in-out;
      color: #2563eb;
      transition: opacity 0.3s;
      z-index: 5;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: #1e293b;
      stroke-width: 1.8;
      fill: none;
    }

    .icon:hover { opacity: 0.5; }

    /* ----- 30 icons with varied positions (original 22 + 8 new) ----- */
    .icon1 { top: 3%; left: 2%; width: 48px; animation-delay: 0s; }
    .icon2 { top: 10%; right: 3%; width: 65px; animation-delay: 0.4s; }
    .icon3 { top: 20%; left: 6%; width: 52px; animation-delay: 0.8s; }
    .icon4 { top: 32%; right: 7%; width: 70px; animation-delay: 1.2s; }
    .icon5 { top: 42%; left: 3%; width: 55px; animation-delay: 1.6s; }
    .icon6 { top: 53%; right: 5%; width: 60px; animation-delay: 2s; }
    .icon7 { top: 63%; left: 8%; width: 50px; animation-delay: 2.4s; }
    .icon8 { top: 73%; right: 2%; width: 72px; animation-delay: 2.8s; }
    .icon9 { top: 82%; left: 4%; width: 48px; animation-delay: 3.2s; }
    .icon10 { top: 92%; right: 6%; width: 58px; animation-delay: 3.6s; }
    .icon11 { top: 12%; left: 15%; width: 64px; animation-delay: 4s; }
    .icon12 { top: 25%; right: 15%; width: 55px; animation-delay: 4.4s; }
    .icon13 { top: 38%; left: 12%; width: 68px; animation-delay: 4.8s; }
    .icon14 { top: 48%; right: 12%; width: 52px; animation-delay: 5.2s; }
    .icon15 { top: 60%; left: 14%; width: 70px; animation-delay: 5.6s; }
    .icon16 { top: 72%; right: 14%; width: 58px; animation-delay: 6s; }
    .icon17 { top: 6%; left: 22%; width: 62px; animation-delay: 6.4s; }
    .icon18 { top: 18%; right: 22%; width: 54px; animation-delay: 6.8s; }
    .icon19 { top: 30%; left: 20%; width: 66px; animation-delay: 7.2s; }
    .icon20 { top: 44%; right: 20%; width: 50px; animation-delay: 7.6s; }
    .icon21 { top: 56%; left: 23%; width: 72px; animation-delay: 8s; }
    .icon22 { top: 68%; right: 23%; width: 56px; animation-delay: 8.4s; }
    /* new icons 23 to 30 */
    .icon23 { top: 8%; left: 35%; width: 63px; animation-delay: 1.1s; }
    .icon24 { top: 22%; right: 35%; width: 59px; animation-delay: 2.3s; }
    .icon25 { top: 36%; left: 40%; width: 67px; animation-delay: 3.7s; }
    .icon26 { top: 50%; right: 40%; width: 53px; animation-delay: 4.9s; }
    .icon27 { top: 64%; left: 45%; width: 71px; animation-delay: 5.8s; }
    .icon28 { top: 78%; right: 45%; width: 49px; animation-delay: 6.7s; }
    .icon29 { top: 15%; left: 55%; width: 61px; animation-delay: 7.9s; }
    .icon30 { top: 88%; right: 55%; width: 57px; animation-delay: 9.2s; }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      50% { transform: translateY(-20px) rotate(6deg) scale(1.05); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    /* top badge */
    .top-badge {
      position: absolute;
      top: 30px;
      left: 30px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      color: #2563eb;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.95);
      z-index: 30;
    }
    .badge-count {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      padding: 4px 12px;
      border-radius: 40px;
      margin-left: 10px;
      font-size: 12px;
    }

    /* scroll indicator (bottom right) */
    .scroll-down {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      animation: blink 2s infinite;
      background: rgba(255, 255, 255, 0.7);
      padding: 6px 18px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      letter-spacing: 1px;
      z-index: 30;
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: translateY(0); }
      50% { opacity: 0.5; transform: translateY(5px); }
    }

    /* responsive adjustments */
    @media (max-width: 1000px) {
      .split-container {
        flex-direction: column-reverse; /* keep text on top, bars below */
        padding: 80px 20px 40px;
        text-align: center;
      }
      .content-col {
        text-align: center;
      }
      .content-col h1 {
        font-size: 48px;
      }
      .hero-description {
        margin-left: auto;
        margin-right: auto;
      }
      .arrow {
        left: -40px;
      }
    }

    @media (max-width: 600px) {
      .bar { width: 45px; font-size: 16px; }
      .bar:nth-child(1) { height: 90px; }
      .bar:nth-child(2) { height: 120px; }
      .bar:nth-child(3) { height: 150px; }
      .bar:nth-child(4) { height: 180px; }
      .bar:nth-child(5) { height: 210px; }
      .bar:nth-child(6) { height: 240px; }
      .arrow { width: 300px; left: -10px; top: 10px; }
      .top-badge { left: 20px; top: 20px; padding: 8px 18px; }
      .scroll-down { right: 20px; }
    }
  </style>
</head>
